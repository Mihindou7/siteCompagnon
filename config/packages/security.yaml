security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_SELLER: ROLE_USER
        ROLE_ADMIN:  [ROLE_USER, ROLE_SELLER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        refresh:
            pattern: ^/api/auth/token/refresh
            stateless: true
            refresh_jwt:
                check_path: /api/auth/token/refresh

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            entry_point: jwt

    access_control:
        - { path: ^/api/auth,                     roles: PUBLIC_ACCESS }
        - { path: ^/api/species,                  methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/breeds,                   methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/animals,                  methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/sellers/\d+$,             methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/seller,                   roles: ROLE_SELLER }
        - { path: ^/api/admin,                    roles: ROLE_ADMIN }
        - { path: ^/api,                          roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
